<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the deep ancestral roots of Nagy Elshal through a rigorous research-based genetic analysis across 20,000+ ancient and modern genomes.">
    <meta property="og:title" content="Nagy Elshal - Complete Ancestry Analysis Results">
    <meta property="og:description" content="Deep genetic history revealed through 20,134 ancient & modern genomes using research-grade methods">
    <meta property="og:type" content="website">
    <title>Nagy Elshal - Complete Ancestry Analysis Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            margin-left: 220px;
        }

        .sidebar {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 180px;
            height: calc(100vh - 40px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #4ecdc4;
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: center;
        }

        .nav-item {
            display: block;
            padding: 12px 15px;
            margin-bottom: 8px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(78, 205, 196, 0.2);
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        .quick-bubbles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bubble {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: white;
        }

        .bubble:hover {
            background: rgba(78, 205, 196, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.3);
        }

        .bubble-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .bubble-text {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .section-summary {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #4ecdc4;
        }

        .summary-title {
            color: #4ecdc4;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(78, 205, 196, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: rgba(78, 205, 196, 1);
            transform: translateY(-5px);
        }

        .mobile-nav-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: rgba(78, 205, 196, 0.8);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ancestry-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .ancestry-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .ancestry-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--accent-color);
        }

        .ancestry-card.neolithic { --accent-color: #e74c3c; }
        .ancestry-card.steppe { --accent-color: #f39c12; }
        .ancestry-card.hunter { --accent-color: #27ae60; }

        .percentage {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .component-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .component-details {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .historical-timeline {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .timeline-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            color: #4ecdc4;
        }

        .timeline {
            position: relative;
            margin: 60px 0;
            padding: 0 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, 
                #e74c3c 0%, 
                #f39c12 25%, 
                #f1c40f 50%, 
                #27ae60 75%, 
                #2ecc71 100%);
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .timeline-event {
            display: flex;
            margin-bottom: 60px;
            position: relative;
            align-items: center;
            opacity: 0;
            animation: slideInTimeline 0.8s ease forwards;
        }

        .timeline-event:nth-child(1) { animation-delay: 0.2s; }
        .timeline-event:nth-child(2) { animation-delay: 0.4s; }
        .timeline-event:nth-child(3) { animation-delay: 0.6s; }
        .timeline-event:nth-child(4) { animation-delay: 0.8s; }

        @keyframes slideInTimeline {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timeline-event:nth-child(odd) {
            flex-direction: row-reverse;
        }

        .timeline-content {
            width: 42%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .timeline-content:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            border-color: var(--period-color);
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--period-color);
            border-radius: 20px 20px 0 0;
        }

        .timeline-event.neolithic .timeline-content { 
            --period-color: #e74c3c;
            border-left: 3px solid #e74c3c;
        }
        .timeline-event.steppe .timeline-content { 
            --period-color: #f39c12;
            border-left: 3px solid #f39c12;
        }
        .timeline-event.hunter .timeline-content { 
            --period-color: #27ae60;
            border-left: 3px solid #27ae60;
        }

        .timeline-event:nth-child(odd) .timeline-content {
            margin-right: 16%;
        }

        .timeline-event:nth-child(even) .timeline-content {
            margin-left: 16%;
        }

        .timeline-marker {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--marker-color);
            border: 5px solid white;
            transform: translate(-50%, -50%);
            z-index: 3;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .timeline-marker::before {
            content: var(--marker-icon);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
        }

        .timeline-event.neolithic .timeline-marker { 
            --marker-color: #e74c3c;
            --marker-icon: '🌾';
        }
        .timeline-event.steppe .timeline-marker { 
            --marker-color: #f39c12;
            --marker-icon: '🐎';
        }
        .timeline-event.hunter .timeline-marker { 
            --marker-color: #27ae60;
            --marker-icon: '🏹';
        }

        .timeline-marker:hover {
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 0 30px var(--marker-color);
        }

        .timeline-date {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-date::before {
            content: '📅';
            font-size: 1.1rem;
        }

        .timeline-period {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 18px;
            color: var(--period-color);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .timeline-content p {
            line-height: 1.7;
            font-size: 1rem;
            opacity: 0.95;
        }

        .timeline-percentage {
            position: absolute;
            top: -10px;
            right: 20px;
            background: var(--period-color);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .timeline-artifacts {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border-left: 3px solid var(--period-color);
        }

        .timeline-artifacts h4 {
            color: var(--period-color);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .timeline-artifacts p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .samples-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-align: center;
            color: #4ecdc4;
        }

        .sample-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .category-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 10px;
        }

        .top-matches {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .matches-grid {
            display: grid;
            gap: 20px;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .match-rank {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ecdc4;
            width: 40px;
        }

        .match-info h3 {
            margin-bottom: 8px;
            color: #fff;
        }

        .match-details {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .match-similarity {
            text-align: center;
        }

        .similarity-score {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 5px;
        }

        .affinity-tooltip {
            position: relative;
            cursor: help;
        }

        .affinity-tooltip:hover::after {
            content: "Statistical affinity reflects genetic profile closeness based on ADMIXTURE proportions, not direct ancestry";
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: normal;
            width: 250px;
            text-align: center;
            z-index: 1000;
            border: 1px solid #4ecdc4;
        }

        @media (max-width: 768px) {
            .container {
                margin-left: 0;
                padding: 20px;
            }
            
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 250px;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .mobile-nav-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .quick-bubbles {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 20px;
            }
            
            .bubble {
                padding: 15px;
            }
            
            .bubble-icon {
                font-size: 1.5rem;
            }
            
            .bubble-text {
                font-size: 0.8rem;
            }
            
            .timeline::before {
                left: 20px;
            }
            
            .timeline-event {
                flex-direction: row !important;
            }
            
            .timeline-content {
                width: calc(100% - 60px) !important;
                margin-left: 40px !important;
                margin-right: 0 !important;
            }
            
            .timeline-marker {
                left: 20px !important;
                transform: translateX(-50%);
            }
            
            .match-card {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .header h1 {
                font-size: 2rem;
            }

            .ancestry-summary {
                grid-template-columns: 1fr;
            }

            .sample-categories {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
